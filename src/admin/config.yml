backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "interviews"
    label: "Interviews"
    label_singular: "Interview"
    folder: "src/content/interviews"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{placeName}} ({{date}})"
    sortable_fields: ["date", "name", "neighborhood"]
    fields:
      - label: "Interviewee Name"
        name: "name"
        widget: "string"
        hint: "Full name of the person you interviewed"

      - label: "Pull Quote"
        name: "quote"
        widget: "string"
        hint: "The headline quote from the interview"

      - label: "Short Bio"
        name: "bio"
        widget: "string"
        hint: "One-line bio, e.g. 'Actor, writer, and director'"

      - label: "Interview Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false

      - label: "Substack URL"
        name: "substackUrl"
        widget: "string"
        hint: "Full link to the interview on Substack"

      - label: "Place Name"
        name: "placeName"
        widget: "string"
        hint: "Name of the spot, e.g. 'Union Square Park'"

      - label: "Place Type"
        name: "placeType"
        widget: "string"
        required: false
        hint: "e.g. Park, Restaurant, Coffee Shop, Museum"

      - label: "Latitude"
        name: "latitude"
        widget: "number"
        value_type: "float"
        hint: "Right-click a place on Google Maps and click the coordinates to copy. Paste the first number here."

      - label: "Longitude"
        name: "longitude"
        widget: "number"
        value_type: "float"
        hint: "Right-click a place on Google Maps and click the coordinates to copy. Paste the second number here."

      - label: "Neighborhood"
        name: "neighborhood"
        widget: "string"
        required: false
        hint: "e.g. Gramercy, Bed-Stuy, East Village"

      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false
        hint: "Optional photo of the interviewee"
